name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
        env:
          # Wyrdroom worker (Shipment 2 cutover)
          VITE_WORKER_URL: https://wyrdroom-proxy.gamerdad29.workers.dev
          # SEC-01 removed VITE_PROXY_SECRET from the frontend entirely.
          # Access is now gated by strict origin validation + rate
          # limiting on the worker side.

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pages project name is an internal dashboard label; kept as
          # 'apoc' during transition. Primary user-facing URL is
          # https://wyrdroom.com via a custom domain on this project.
          command: pages deploy dist --project-name=apoc
